name: PR CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore NuGet packages
        run: dotnet restore ShiroBot.Adapter.DemoAdapter.slnx

      - name: Build
        run: dotnet build ShiroBot.Adapter.DemoAdapter.slnx --configuration Release --no-restore

      - name: Test service contracts
        run: dotnet test ShiroBot.Adapter.DemoAdapter.slnx --configuration Release --no-build --no-restore
