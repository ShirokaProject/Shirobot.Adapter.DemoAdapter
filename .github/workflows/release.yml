name: Tag Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name, for example v0.7.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore NuGet packages
        run: dotnet restore ShiroBot.Adapter.DemoAdapter.slnx

      - name: Build
        run: dotnet build ShiroBot.Adapter.DemoAdapter.slnx --configuration Release --no-restore

      - name: Test service contracts
        run: dotnet test ShiroBot.Adapter.DemoAdapter.slnx --configuration Release --no-build --no-restore

      - name: Publish adapter
        run: dotnet publish ShiroBot.Adapter.DemoAdapter.csproj --configuration Release --no-restore --output artifacts/publish

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p artifacts/release
          cp artifacts/publish/ShiroBot.Adapter.DemoAdapter.dll artifacts/release/
          if [ -f artifacts/publish/ShiroBot.Adapter.DemoAdapter.pdb ]; then
            cp artifacts/publish/ShiroBot.Adapter.DemoAdapter.pdb artifacts/release/
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: artifacts/release/*
