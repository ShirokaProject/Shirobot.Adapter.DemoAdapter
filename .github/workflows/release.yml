name: Tag Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name, for example v0.7.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout ShiroBot SDK source
        uses: actions/checkout@v4
        with:
          repository: ShirokaProject/ShiroBot
          path: shirobot-core
          ref: master

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack current SDK
        run: |
          dotnet pack shirobot-core/ShiroBot.Model/ShiroBot.Model.csproj -c Release -o artifacts/nuget
          dotnet pack shirobot-core/ShiroBot.SDK/ShiroBot.SDK.csproj -c Release -o artifacts/nuget

      - name: Restore against the current SDK package
        run: >-
          dotnet restore ShiroBot.Adapter.DemoAdapter.slnx
          -p:UseLocalShiroBotSdk=false
          --source artifacts/nuget
          --source https://api.nuget.org/v3/index.json

      - name: Build
        run: dotnet build ShiroBot.Adapter.DemoAdapter.slnx --configuration Release --no-restore -p:UseLocalShiroBotSdk=false

      - name: Test service contracts
        run: dotnet test ShiroBot.Adapter.DemoAdapter.slnx --configuration Release --no-build --no-restore -p:UseLocalShiroBotSdk=false

      - name: Publish adapter
        run: dotnet publish ShiroBot.Adapter.DemoAdapter.csproj --configuration Release --no-restore --output artifacts/publish -p:UseLocalShiroBotSdk=false

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p artifacts/release
          cp artifacts/publish/ShiroBot.Adapter.DemoAdapter.dll artifacts/release/
          if [ -f artifacts/publish/ShiroBot.Adapter.DemoAdapter.pdb ]; then
            cp artifacts/publish/ShiroBot.Adapter.DemoAdapter.pdb artifacts/release/
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: artifacts/release/*
